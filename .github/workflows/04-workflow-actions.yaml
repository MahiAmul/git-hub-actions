name: runner-actions

on: push

jobs:
  runner-ubuntu:
    name: runner-actions
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: change working directory
        run: |
          cd /home/runner/work/git-hub-actions/git-hub-actions/.github/04-using-actions/my-app
          ls -l
      - name: set up node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci